<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cody">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF6B35">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Cody%20-%20Your%20English%20Buddy%22%2C%22short_name%22%3A%22Cody%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F0F7FF%22%2C%22theme_color%22%3A%22%23FF6B35%22%7D">
<title>Cody - Your English Buddy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --orange:#FF6B35; --sky:#4ECDC4; --yellow:#FFE66D;
    --pink:#FF8FAB; --cream:#FFF8F0; --bg:#F0F7FF;
    --text:#2D3436; --cody-light:#F5E0C3; --cody-mid:#E8C9A0;
    --cody-dark:#C9A67A; --cody-nose:#3D2B1F;
  }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family:'Fredoka','Nunito',system-ui,sans-serif;
    background:var(--bg); display:flex; flex-direction:column;
    -webkit-tap-highlight-color:transparent; user-select:none;
  }

  /* ===== HEADER ===== */
  .header {
    background:linear-gradient(135deg,#FF6B35 0%,#FF8FAB 100%);
    padding:10px 16px; display:flex; align-items:center; gap:12px;
    box-shadow:0 4px 20px rgba(255,107,53,.3); z-index:10; flex-shrink:0;
  }
  .header-avatar {
    width:50px; height:50px; border-radius:50%;
    background:var(--cream); overflow:hidden; flex-shrink:0;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    border:2.5px solid rgba(255,255,255,.5);
  }
  .header-avatar svg { width:100%; height:100%; }
  .header-info { flex:1; }
  .header-name { font-size:20px; font-weight:700; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.12); }
  .header-status {
    font-size:12px; color:rgba(255,255,255,.85);
    display:flex; align-items:center; gap:5px; margin-top:1px;
  }
  .status-dot {
    width:8px; height:8px; border-radius:50%; background:#7CFF6B;
    box-shadow:0 0 6px #7CFF6B; animation:pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ===== CHAT ===== */
  .chat-area {
    flex:1; overflow-y:auto; padding:14px 14px 8px;
    display:flex; flex-direction:column; gap:10px;
    scroll-behavior:smooth;
    background:
      radial-gradient(circle at 15% 85%, rgba(78,205,196,.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 15%, rgba(255,107,53,.05) 0%, transparent 50%),
      var(--bg);
  }
  .chat-area::-webkit-scrollbar { width:3px; }
  .chat-area::-webkit-scrollbar-thumb { background:rgba(0,0,0,.08); border-radius:2px; }

  .msg-row {
    display:flex; gap:8px; max-width:90%;
    animation:msgIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  .msg-row.ai { align-self:flex-start; }
  .msg-row.user { align-self:flex-end; flex-direction:row-reverse; }
  @keyframes msgIn { from{opacity:0;transform:translateY(14px) scale(.95)} to{opacity:1;transform:none} }

  .msg-avatar {
    width:38px; height:38px; border-radius:50%; overflow:hidden;
    flex-shrink:0; align-self:flex-end;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
  }
  .msg-avatar svg { width:100%; height:100%; }
  .msg-row.user .msg-avatar {
    background:linear-gradient(135deg,#E8CDB0,#D4B48C);
    display:flex; align-items:center; justify-content:center;
    border:2px solid rgba(255,255,255,.5);
  }

  .msg-bubble {
    padding:12px 16px; border-radius:18px;
    font-size:15.5px; line-height:1.65; word-break:break-word; position:relative;
  }
  .msg-row.ai .msg-bubble {
    background:#fff; color:var(--text); border-bottom-left-radius:5px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
  }
  .msg-row.user .msg-bubble {
    background:linear-gradient(135deg,#4ECDC4,#45B7AA); color:#fff;
    border-bottom-right-radius:5px; box-shadow:0 2px 10px rgba(78,205,196,.3);
  }
  .msg-bubble .en { font-weight:600; font-size:16px; }
  .msg-bubble .zh { font-size:12.5px; opacity:.55; margin-top:4px; font-family:'Nunito',sans-serif; }
  .msg-row.user .msg-bubble .zh { opacity:.8; }

  .word-hint {
    display:inline-block; background:rgba(255,230,109,.3); border-radius:5px;
    padding:0 5px; cursor:pointer; transition:background .15s;
    border-bottom:2px dashed rgba(255,107,53,.35);
  }
  .word-hint:active { background:rgba(255,230,109,.55); }

  /* Typing */
  .typing-row { display:flex; gap:8px; align-self:flex-start; max-width:90%; }
  .typing-bubble {
    background:#fff; padding:14px 20px; border-radius:18px;
    border-bottom-left-radius:5px; display:flex; gap:5px; align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
  }
  .typing-dot {
    width:7px; height:7px; border-radius:50%; background:var(--cody-dark);
    animation:bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2){animation-delay:.15s}
  .typing-dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce {
    0%,60%,100%{transform:translateY(0);opacity:.35}
    30%{transform:translateY(-7px);opacity:1}
  }

  /* ===== QUICK REPLIES ===== */
  .quick-replies {
    display:flex; gap:7px; padding:6px 14px 2px;
    overflow-x:auto; flex-shrink:0; -webkit-overflow-scrolling:touch;
  }
  .quick-replies::-webkit-scrollbar{display:none}
  .quick-btn {
    flex-shrink:0; padding:9px 16px; border-radius:22px;
    border:2px solid var(--orange); background:rgba(255,107,53,.06);
    color:var(--orange); font-family:'Fredoka',sans-serif;
    font-size:13.5px; font-weight:600; cursor:pointer;
    transition:all .2s; white-space:nowrap;
  }
  .quick-btn:active { background:var(--orange); color:#fff; transform:scale(.95); }

  /* ===== INPUT BAR ===== */
  .input-bar {
    display:flex; align-items:center; gap:8px;
    padding:8px 14px; padding-bottom:max(8px,env(safe-area-inset-bottom));
    background:#fff; border-top:1px solid rgba(0,0,0,.05); flex-shrink:0;
  }
  .text-input {
    flex:1; height:46px; border-radius:23px;
    border:2px solid #E8E8E8; padding:0 18px;
    font-family:'Fredoka',sans-serif; font-size:15px;
    outline:none; transition:border-color .2s;
    color:var(--text); background:#FAFAFA;
  }
  .text-input:focus { border-color:var(--sky); background:#fff; }
  .text-input::placeholder { color:#BBB; }

  .mic-btn {
    width:54px; height:54px; border-radius:50%; border:none;
    background:linear-gradient(135deg,var(--orange),#FF8FAB);
    color:#fff; font-size:22px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(255,107,53,.35);
    transition:all .2s; flex-shrink:0; position:relative;
  }
  .mic-btn:active { transform:scale(.9); }
  .mic-btn.recording {
    background:linear-gradient(135deg,#FF3B30,#FF6B35);
    animation:micPulse 1s infinite;
  }
  @keyframes micPulse {
    0%,100%{box-shadow:0 4px 20px rgba(255,59,48,.5)}
    50%{box-shadow:0 4px 32px rgba(255,59,48,.8)}
  }
  .send-btn {
    width:46px; height:46px; border-radius:50%; border:none;
    background:linear-gradient(135deg,var(--sky),#45B7AA);
    color:#fff; font-size:19px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(78,205,196,.3);
    transition:all .2s; flex-shrink:0;
  }
  .send-btn:active { transform:scale(.9); }

  /* ===== WORD POPUP ===== */
  .popup-backdrop {
    position:fixed; inset:0; background:rgba(0,0,0,.3);
    z-index:140; opacity:0; transition:opacity .3s; pointer-events:none;
  }
  .popup-backdrop.show { opacity:1; pointer-events:auto; }
  .word-popup {
    position:fixed; bottom:0; left:0; right:0;
    background:#fff; border-radius:22px 22px 0 0;
    padding:22px 18px; padding-bottom:max(22px,env(safe-area-inset-bottom));
    z-index:150; box-shadow:0 -4px 28px rgba(0,0,0,.14);
    transform:translateY(100%); transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .word-popup.show { transform:translateY(0); }
  .word-popup .wp-en { font-size:26px; font-weight:700; color:var(--orange); }
  .word-popup .wp-ph { font-size:13px; color:#999; margin:2px 0 6px; font-family:'Nunito',sans-serif; }
  .word-popup .wp-zh { font-size:17px; color:var(--text); margin-bottom:14px; }
  .word-popup .wp-ex {
    font-size:14.5px; color:#555; padding:11px 14px;
    background:#F7F7F7; border-radius:12px; line-height:1.6;
  }
  .word-popup .wp-ex b { color:var(--orange); }
  .word-popup .wp-speak {
    display:inline-flex; align-items:center; gap:5px;
    margin-top:10px; padding:8px 16px; border-radius:18px;
    border:none; background:var(--sky); color:#fff;
    font-family:'Fredoka',sans-serif; font-size:13px;
    font-weight:600; cursor:pointer;
  }
  .word-popup .wp-speak:active { transform:scale(.95); }
  .word-popup .close-btn {
    position:absolute; top:10px; right:14px;
    background:none; border:none; font-size:22px;
    color:#CCC; cursor:pointer; padding:4px;
  }

  /* Toast */
  .toast {
    position:fixed; top:76px; left:50%; transform:translateX(-50%) translateY(-16px);
    background:rgba(45,52,54,.88); color:#fff; padding:10px 22px;
    border-radius:13px; font-size:13.5px; font-weight:500; z-index:200;
    opacity:0; transition:all .3s; pointer-events:none;
    backdrop-filter:blur(8px); white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Voice Picker */
  .voice-panel {
    position:fixed; bottom:0; left:0; right:0;
    background:#fff; border-radius:22px 22px 0 0;
    padding:18px 16px; padding-bottom:max(18px,env(safe-area-inset-bottom));
    z-index:160; box-shadow:0 -4px 28px rgba(0,0,0,.18);
    transform:translateY(100%); transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    max-height:60vh; display:flex; flex-direction:column;
  }
  .voice-panel.show { transform:translateY(0); }
  .voice-panel .vp-title { font-size:17px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .voice-panel .vp-sub { font-size:12px; color:#999; margin-bottom:12px; }
  .voice-panel .vp-list { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
  .voice-item {
    display:flex; align-items:center; gap:10px; padding:11px 12px;
    border-radius:12px; margin-bottom:6px; cursor:pointer;
    transition:background .15s; border:2px solid transparent;
  }
  .voice-item:active { background:rgba(255,107,53,.08); }
  .voice-item.active { border-color:var(--orange); background:rgba(255,107,53,.06); }
  .voice-item .vi-name { font-size:14px; font-weight:600; color:var(--text); flex:1; }
  .voice-item .vi-lang { font-size:11px; color:#999; }
  .voice-item .vi-play { font-size:18px; width:32px; text-align:center; }
  .voice-panel .vp-close {
    position:absolute; top:10px; right:14px;
    background:none; border:none; font-size:22px; color:#CCC; cursor:pointer; padding:4px;
  }

  /* Welcome card */
  .welcome-card {
    background:linear-gradient(135deg,#FFF8F0,#FFE8D6);
    border-radius:20px; padding:20px 18px; margin:4px 2px 8px;
    text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.05);
    animation:msgIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  .welcome-card .wc-avatar { width:72px; height:72px; margin:0 auto 10px; border-radius:50%; overflow:hidden; box-shadow:0 3px 14px rgba(201,166,122,.3); border:3px solid #fff; }
  .welcome-card .wc-avatar svg { width:100%; height:100%; }
  .welcome-card .wc-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .welcome-card .wc-sub { font-size:13.5px; color:#888; line-height:1.5; }

  @media(min-width:600px){
    body{max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.1)}
  }
</style>
</head>
<body>

<!-- SVG DEFS (shared poodle face) -->
<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <radialGradient id="fur" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#F7EAD4"/>
      <stop offset="55%" stop-color="#ECDABE"/>
      <stop offset="100%" stop-color="#D9C0A0"/>
    </radialGradient>
    <radialGradient id="ear" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8CDB0"/>
      <stop offset="100%" stop-color="#CBAA85"/>
    </radialGradient>
    <symbol id="cody-face" viewBox="0 0 100 100">
      <!-- Ears -->
      <ellipse cx="19" cy="32" rx="17" ry="21" fill="url(#ear)"/>
      <ellipse cx="81" cy="32" rx="17" ry="21" fill="url(#ear)"/>
      <!-- Ear curls -->
      <circle cx="9" cy="22" r="6" fill="#D4B48C" opacity=".7"/>
      <circle cx="25" cy="18" r="5.5" fill="#D4B48C" opacity=".7"/>
      <circle cx="17" cy="14" r="5" fill="#D4B48C" opacity=".6"/>
      <circle cx="91" cy="22" r="6" fill="#D4B48C" opacity=".7"/>
      <circle cx="75" cy="18" r="5.5" fill="#D4B48C" opacity=".7"/>
      <circle cx="83" cy="14" r="5" fill="#D4B48C" opacity=".6"/>
      <!-- Head -->
      <circle cx="50" cy="48" r="36" fill="url(#fur)"/>
      <!-- Top curls -->
      <circle cx="36" cy="15" r="9" fill="#E8CDB0"/>
      <circle cx="50" cy="11" r="10" fill="#ECDABE"/>
      <circle cx="64" cy="15" r="9" fill="#E8CDB0"/>
      <circle cx="42" cy="8" r="7" fill="#DCC4A0" opacity=".7"/>
      <circle cx="58" cy="8" r="7" fill="#DCC4A0" opacity=".7"/>
      <!-- Cheek puffs -->
      <circle cx="26" cy="55" r="12" fill="#F0D9BC" opacity=".6"/>
      <circle cx="74" cy="55" r="12" fill="#F0D9BC" opacity=".6"/>
      <!-- Muzzle -->
      <ellipse cx="50" cy="57" rx="17" ry="13" fill="#FAF0E2"/>
      <!-- Eyes -->
      <circle cx="37" cy="43" r="5.5" fill="#2D1F10"/>
      <circle cx="63" cy="43" r="5.5" fill="#2D1F10"/>
      <!-- Eye sparkle -->
      <circle cx="39.5" cy="41" r="2.2" fill="#fff"/>
      <circle cx="65.5" cy="41" r="2.2" fill="#fff"/>
      <circle cx="35.5" cy="44.5" r="1" fill="#fff" opacity=".5"/>
      <circle cx="61.5" cy="44.5" r="1" fill="#fff" opacity=".5"/>
      <!-- Nose -->
      <ellipse cx="50" cy="54" rx="6.5" ry="4.8" fill="#3D2B1F"/>
      <ellipse cx="50" cy="53" rx="3" ry="1.5" fill="#5D4535" opacity=".4"/>
      <!-- Mouth -->
      <path d="M44 60 Q50 65 56 60" fill="none" stroke="#5D4037" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M50 60 V56" fill="none" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Tongue -->
      <ellipse cx="50" cy="64.5" rx="3.5" ry="3" fill="#F48FB1"/>
      <ellipse cx="50" cy="63.8" rx="2" ry="1.5" fill="#F8BBD0" opacity=".6"/>
      <!-- Bow -->
      <path d="M38 76 Q44 72 50 76 Q56 72 62 76" fill="#FF8FAB" opacity=".85"/>
      <circle cx="50" cy="76" r="2.5" fill="#FF6B8A"/>
    </symbol>
  </defs>
</svg>

<!-- HEADER -->
<div class="header">
  <div class="header-avatar"><svg><use href="#cody-face"/></svg></div>
  <div class="header-info">
    <div class="header-name">Cody</div>
    <div class="header-status"><span class="status-dot"></span> Online · 4-month-old puppy, here to chat!</div>
  </div>
  <button id="voiceBtn" style="background:rgba(255,255,255,.2);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;color:#fff;cursor:pointer;flex-shrink:0;" title="切换声音">🔊</button>
</div>

<!-- CHAT -->
<div class="chat-area" id="chatArea"></div>

<!-- QUICK REPLIES -->
<div class="quick-replies" id="quickReplies"></div>

<!-- INPUT -->
<div class="input-bar">
  <input class="text-input" id="textInput" type="text"
    placeholder="Type or tap 🎤 to speak..." autocomplete="off" enterkeyhint="send">
  <button class="mic-btn" id="micBtn" title="Tap to speak">🎤</button>
  <button class="send-btn" id="sendBtn" title="Send">➤</button>
</div>

<!-- WORD POPUP -->
<div class="popup-backdrop" id="popupBackdrop" onclick="closeWord()"></div>
<div class="word-popup" id="wordPopup">
  <button class="close-btn" onclick="closeWord()">✕</button>
  <div class="wp-en" id="wpEn"></div>
  <div class="wp-ph" id="wpPh"></div>
  <div class="wp-zh" id="wpZh"></div>
  <div class="wp-ex" id="wpEx"></div>
  <button class="wp-speak" id="wpSpeak">🔊 Listen</button>
</div>

<!-- VOICE PICKER -->
<div class="popup-backdrop" id="voiceBackdrop" onclick="closeVoicePicker()"></div>
<div class="voice-panel" id="voicePanel">
  <button class="vp-close" onclick="closeVoicePicker()">✕</button>
  <div class="vp-title">选择声音 Pick a Voice</div>
  <div class="vp-sub">点击试听，选一个最像小男孩的声音 👦</div>
  <div class="vp-list" id="voiceList"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  VOCABULARY — 100+ words for click-to-learn
// ============================================================
const DICT = {};
function W(en,ph,zh,ex){ DICT[en.toLowerCase()]={en,ph,zh,ex}; }
W("hello","/həˈloʊ/","你好","<b>Hello</b>, how are you today?");
W("hi","/haɪ/","嗨","<b>Hi</b> there! Nice to meet you!");
W("name","/neɪm/","名字","My <b>name</b> is Cody!");
W("dog","/dɒɡ/","狗","I'm a little <b>dog</b>!");
W("puppy","/ˈpʌpi/","小狗","I'm a fluffy <b>puppy</b>!");
W("friend","/frend/","朋友","You are my best <b>friend</b>!");
W("like","/laɪk/","喜欢","I <b>like</b> playing!");
W("love","/lʌv/","爱","I <b>love</b> sunny days!");
W("play","/pleɪ/","玩","Let's <b>play</b> together!");
W("food","/fuːd/","食物","What <b>food</b> do you like?");
W("eat","/iːt/","吃","I like to <b>eat</b> bones!");
W("cook","/kʊk/","做饭","Can you <b>cook</b>?");
W("pizza","/ˈpiːtsə/","披萨","I love <b>pizza</b> with cheese!");
W("rice","/raɪs/","米饭","I eat <b>rice</b> every day.");
W("noodle","/ˈnuːdəl/","面条","Chinese <b>noodles</b> are yummy!");
W("chicken","/ˈtʃɪkɪn/","鸡肉","I like fried <b>chicken</b>.");
W("fruit","/fruːt/","水果","<b>Fruit</b> is healthy!");
W("apple","/ˈæpəl/","苹果","I eat an <b>apple</b> a day.");
W("happy","/ˈhæpi/","开心","I'm so <b>happy</b> to see you!");
W("sad","/sæd/","难过","Don't be <b>sad</b>.");
W("tired","/ˈtaɪərd/","累的","I feel <b>tired</b> today.");
W("good","/ɡʊd/","好的","That's really <b>good</b>!");
W("great","/ɡreɪt/","太棒了","That's <b>great</b>!");
W("cool","/kuːl/","酷","That's so <b>cool</b>!");
W("awesome","/ˈɔːsəm/","超棒","You are <b>awesome</b>!");
W("fun","/fʌn/","有趣","That sounds like <b>fun</b>!");
W("beautiful","/ˈbjuːtɪfəl/","美丽","What a <b>beautiful</b> day!");
W("school","/skuːl/","学校","Do you like <b>school</b>?");
W("teacher","/ˈtiːtʃər/","老师","My <b>teacher</b> is nice.");
W("class","/klæs/","课","I like English <b>class</b>.");
W("subject","/ˈsʌbdʒekt/","科目","What's your favorite <b>subject</b>?");
W("math","/mæθ/","数学","I like <b>math</b>.");
W("english","/ˈɪŋɡlɪʃ/","英语","I'm learning <b>English</b>!");
W("science","/ˈsaɪəns/","科学","<b>Science</b> is interesting.");
W("homework","/ˈhoʊmwɜːrk/","作业","I have <b>homework</b> to do.");

// ============================================================
//  STATE
// ============================================================
let currentThread = null;   // current matched thread key
let threadStep = 0;         // current step in thread
let threadCooldown = 0;     // turns before we can switch thread
let turnCount = 0;          // total conversation turns
let usedFallbacks = [];     // track used fallback indices
let recognition = null;
let isRecording = false;
let preferredVoice = null;

// ============================================================
//  DETECT TOPIC FROM USER INPUT
// ============================================================
function detectThread(text) {
  const lower = text.toLowerCase();
  let best = null, bestScore = 0;
  for (const [key, thread] of Object.entries(THREADS)) {
    if (key === currentThread && threadStep < thread.steps.length) continue; // don't re-match current
    let score = 0;
    for (const kw of thread.kw) {
      if (lower.includes(kw.toLowerCase())) score++;
    }
    if (score > bestScore) { bestScore = score; best = key; }
  }
  return bestScore > 0 ? best : null;
}

// ============================================================
//  GENERATE RESPONSE
// ============================================================
function generateResponse(userText) {
  const lower = userText.toLowerCase().trim();
  turnCount++;

  // 1. Safety check
  for (const kw of UNSAFE) {
    if (lower.includes(kw)) {
      currentThread = null; threadStep = 0;
      const r = REDIRECT[Math.floor(Math.random()*REDIRECT.length)];
      return { response: r, quickReplies: ["Sure! Let's chat!","OK, a new topic!"] };
    }
  }

  // Farewells
  if (/\b(bye|goodbye|see you|good night|goodnight)\b/i.test(lower) || /再见|拜拜|晚安/.test(userText)) {
    const byes = [
      {en:"Bye bye! You did amazing today! See you next time, friend! 🐶💕",zh:"拜拜！你今天表现得超棒！下次见，朋友！"},
      {en:"Good night! Sweet dreams! I'll be right here waiting for you! 🌙",zh:"晚安！做个好梦！我会在这里等你！"},
      {en:"See you! Don't forget — you're awesome at English! ⭐",zh:"再见！别忘了——你英语超厉害的！"},
    ];
    const b = byes[Math.floor(Math.random()*byes.length)];
    return { response: b, quickReplies: [] };
  }

  // Thank you
  if (/\bthank/i.test(lower) || /谢谢/.test(userText)) {
    return {
      response: {en:"You're welcome! That's what friends are for! 🐶💛",zh:"不客气！朋友就是这样的嘛！"},
      quickReplies: ["Let's keep chatting!","Tell me something fun"]
    };
  }

  // "I don't know" / confusion
  if (/\b(don't know|dont know|no idea|不知道|不懂)\b/i.test(lower)) {
    return {
      response: {en:"That's totally okay! Learning takes time. Let me ask you something easier! 😊 What's your favorite color?",zh:"完全没关系！学习需要时间。我问你一个简单的问题吧！你最喜欢什么颜色？"},
      quickReplies: ["I like blue!","My favorite is pink!","I like all colors!"]
    };
  }

  // Sorry
  if (/\bsorry\b/i.test(lower) || /对不起|抱歉/.test(userText)) {
    return {
      response: {en:"No need to say sorry! You're doing great! Let's keep chatting! 💪",zh:"不用道歉！你做得很好！我们继续聊吧！"},
      quickReplies: ["OK! What should we talk about?","Tell me something fun!"]
    };
  }

  // 2. Grammar correction check
  for (const c of CORRECTIONS) {
    if (c.p.test(lower)) {
      const corrected = userText.replace(c.p, c.fix);
      return {
        response: {
          en: `Oh, I think you mean: "${corrected}" — small tip: ${c.note}. But great try! You're learning fast! 🌟`,
          zh: `我想你说的是："${corrected}" —— 小提示：${c.note}。不过你已经很棒了！学得很快！`
        },
        quickReplies: ["Thanks for the tip!","Let me try again!","OK, I understand!"]
      };
    }
  }

  // 3. Continue current thread
  if (currentThread && threadStep < THREADS[currentThread].steps.length && threadCooldown > 0) {
    threadCooldown--;
    const step = THREADS[currentThread].steps[threadStep];
    threadStep++;
    // Prepend an acknowledgment based on user input
    const acks = ["That's great! ","Oh nice! ","Cool! ","I see! ","Wow! ","Haha! ","Awesome! "];
    const ack = acks[Math.floor(Math.random()*acks.length)];
    return { response: {en: ack + step.r.en, zh: step.r.zh}, quickReplies: step.q };
  }

  // 4. Detect new thread
  const detected = detectThread(userText);
  if (detected) {
    currentThread = detected;
    threadStep = 1; // we use step 0 now
    threadCooldown = THREADS[detected].steps.length;
    const step = THREADS[detected].steps[0];
    return { response: step.r, quickReplies: step.q };
  }

  // 5. If current thread just ended, offer transition
  if (currentThread && threadStep >= THREADS[currentThread].steps.length) {
    currentThread = null;
    threadStep = 0;
    const transitions = [
      {en:"You're such a great chat buddy! 🌟 Want to talk about something else? How about your hobbies?",zh:"你真是个聊天小能手！想聊点别的吗？比如你的爱好？"},
      {en:"I love talking with you! 😊 What else is on your mind?",zh:"我好喜欢和你聊天！还有什么想聊的？"},
      {en:"You speak English so well! ⭐ Let's try a new topic! What about your family?",zh:"你英语说得真好！我们试试新话题吧！聊聊你的家人？"},
    ];
    const t = transitions[Math.floor(Math.random()*transitions.length)];
    return { response: t, quickReplies: ["Tell me about animals! 🐾","Let's talk about food! 🍕","What about school? 🏫"] };
  }

  // 6. Fallback
  let idx;
  do { idx = Math.floor(Math.random()*FALLBACKS.length); }
  while (usedFallbacks.includes(idx) && usedFallbacks.length < FALLBACKS.length);
  if (usedFallbacks.length >= FALLBACKS.length) usedFallbacks = [];
  usedFallbacks.push(idx);

  // Every few turns, suggest a topic
  if (turnCount % 4 === 0) {
    const suggestions = [
      "By the way, what's your favorite animal? 🐾",
      "I'm curious — what did you eat today? 🍕",
      "Tell me about your best friend! 👫",
      "What do you want to be when you grow up? 🌟",
      "Do you like music? What kind? 🎵",
    ];
    const s = suggestions[Math.floor(Math.random()*suggestions.length)];
    const fb = FALLBACKS[idx];
    return {
      response: {en: fb.en + " " + s, zh: fb.zh},
      quickReplies: ["Sure, let me tell you!","That's a good question!","Hmm, let me think..."]
    };
  }

  return {
    response: FALLBACKS[idx],
    quickReplies: ["Tell me more!","That's cool!","What about you, Cody?"]
  };
}

// --- Mini-game state ---
let gameMode = null; // null, 'wyr', 'riddle', 'story', 'guess'
let gameData = null;
let qbUsed = [];

function pickQB(type) {
  const pool = QBANK.filter(q => q.type === type && !qbUsed.includes(QBANK.indexOf(q)));
  if (pool.length === 0) { qbUsed = qbUsed.filter(i => QBANK[i].type !== type); return pickQB(type); }
  const item = pool[Math.floor(Math.random() * pool.length)];
  qbUsed.push(QBANK.indexOf(item));
  return item;
}

// --- Guess the animal game ---
const ANIMAL_CLUES = [
  {clues:["I'm very big and grey","I have a long nose called a trunk","I live in Africa or Asia"], answer:"elephant"},
  {clues:["I'm orange and black","I'm the king of the jungle","I have a big mane"], answer:"lion"},
  {clues:["I can fly","I'm very colorful","I love flowers"], answer:"butterfly"},
  {clues:["I live in the ocean","I'm very smart","I can jump high"], answer:"dolphin"},
  {clues:["I have eight legs","I can spin a web","I'm small and scary to some people"], answer:"spider"},
  {clues:["I'm black and white","I eat bamboo","I live in China"], answer:"panda"},
  {clues:["I have no legs","I slither on the ground","Some people are scared of me"], answer:"snake"},
  {clues:["I'm very small","I make honey","I can sting you"], answer:"bee"},
  {clues:["I'm red and I live in water","I have a big tail","People keep me in bowls"], answer:"goldfish"},
  {clues:["I sleep upside down","I fly at night","I use sound to find things"], answer:"bat"},
];
let guessState = null;

function startGuessGame() {
  const animal = ANIMAL_CLUES[Math.floor(Math.random() * ANIMAL_CLUES.length)];
  guessState = {animal, clueIdx: 0};
  return R(
    `Let's play Guess the Animal! 🐾 Here's your first clue: "${animal.clues[0]}" Can you guess what animal I am?`,
    `来玩猜动物游戏！🐾 第一个线索："${animal.clues[0]}" 你猜我是什么动物？`
  );
}

function handleGuess(text) {
  const low = text.toLowerCase();
  if (!guessState) return null;

  // Check for correct answer first
  if (low.includes(guessState.animal.answer)) {
    const a = guessState.animal.answer;
    guessState = null;
    return R(
      `YES! It's a ${a}! You're so smart${nameTag()}! 🎉🐾 Want to play again or talk about something else?`,
      `对啦！是${a}！你好聪明${nameTag()}！🎉🐾 再玩一次还是聊别的？`
    );
  }

  // Detect hint requests — give another clue WITHOUT revealing answer
  const hintPattern = /\b(hint|more clues|another clue|give me a clue|give me a hint|one more clue|need help)\b/i;
  if (hintPattern.test(low) || /提示|线索|再给个/.test(text)) {
    if (guessState.clueIdx < guessState.animal.clues.length - 1) {
      guessState.clueIdx++;
      return R(
        `Here's a hint! 🤔 "${guessState.animal.clues[guessState.clueIdx]}" What do you think now?`,
        `给你一个提示！🤔 "${guessState.animal.clues[guessState.clueIdx]}" 现在觉得是什么？`
      );
    }
    // No more clues — reveal with encouragement
    const a = guessState.animal.answer;
    const funFacts = {
      elephant: "Elephants can remember things for a very long time!",
      lion: "A lion's roar can be heard from 8 kilometers away!",
      butterfly: "Butterflies taste with their feet!",
      dolphin: "Dolphins sleep with one eye open!",
      spider: "Most spiders have eight eyes!",
      panda: "Pandas eat bamboo for about 12 hours a day!",
      snake: "Snakes smell with their tongue!",
      bee: "Bees do a special dance to find flowers!",
      goldfish: "Goldfish can see more colors than humans!",
      bat: "Bats are the only mammals that can truly fly!",
    };
    const fact = funFacts[a] || `"${a}" is a great word to remember!`;
    guessState = null;
    return R(
      `I've given all my clues! The answer is: "${a}"! 🐾 Fun fact: ${fact} Want to try another?`,
      `我的线索都用完了！答案是："${a}"！🐾 小知识：${fact} 要再试一个吗？`
    );
  }

  // Detect give-up phrases — reveal answer with teaching
  const giveUpPattern = /\b(i don't know|dont know|i give up|give up|tell me|no idea|i have no idea|what is it|what's the answer|show me|reveal|pass|skip|i quit|too hard)\b/i;
  if (giveUpPattern.test(low) || /不知道|告诉我|答案|太难|放弃/.test(text)) {
    const a = guessState.animal.answer;
    const funFacts = {
      elephant: "Elephants can remember things for a very long time, and they cry when they're sad!",
      lion: "A lion's roar can be heard from 8 kilometers away! That's really loud!",
      butterfly: "Butterflies taste with their feet! Can you imagine that?",
      dolphin: "Dolphins sleep with one eye open! They're so cool!",
      spider: "Most spiders have eight eyes, but some have none at all!",
      panda: "Pandas spend about 12 hours a day eating bamboo. That's their favorite food!",
      snake: "Snakes smell with their tongue! They flick it to catch scents in the air.",
      bee: "Bees do a special dance to tell other bees where to find flowers!",
      goldfish: "Goldfish can see more colors than humans! They have amazing eyes!",
      bat: "Bats are the only mammals that can truly fly! Pretty cool, right?",
    };
    const fact = funFacts[a] || `Did you know? The word "${a}" is a great vocabulary word to remember!`;
    guessState = null;
    return R(
      `No worries${nameTag()}! The answer was: "${a}"! 🐾 Here's a fun fact: ${fact} Now you know something new! Want to try another one?`,
      `没关系${nameTag()}！答案是："${a}"！🐾 小知识：${fact} 又学到新东西了！要再试一个吗？`
    );
  }

  // Wrong guess — give next clue
  guessState.clueIdx++;
  if (guessState.clueIdx < guessState.animal.clues.length) {
    const encourage = pick([
      "Good try! ", "Nice guess! ", "Almost! ", "Not bad! ", "Close thinking! "
    ]);
    return R(
      `${encourage}Here's another clue: "${guessState.animal.clues[guessState.clueIdx]}" What do you think? 🤔`,
      `${encourage}再来一个线索："${guessState.animal.clues[guessState.clueIdx]}" 你觉得是什么？🤔`
    );
  }
  const a = guessState.animal.answer;
  guessState = null;
  return R(
    `The answer was: "${a}"! Great effort${nameTag()}! Don't worry, this was a tricky one! Want to try another? 🐾`,
    `答案是："${a}"！${nameTag()}你很努力了！这个确实有点难！要再试一个吗？🐾`
  );
}

// --- Would You Rather follow-ups ---
const WYR_REACTIONS = {
  first: ["Haha, great choice! I'd pick the same thing! 😄","Ooh interesting! Tell me why you chose that! 🤔","That's what I expected! You have good taste! ⭐","Wow, bold choice! I respect that! 💪"],
  second: ["Oh wow, the second one? That's unique! 🌟","Interesting! Most people pick the first one! 🤔","Cool! I like how you think! 😊","That's a creative choice! I love it! ✨"],
  both: ["Haha both are good! You're right, they're both awesome! 😄"],
};

// --- Pick a unique follow-up question (global anti-repeat) ---
let globalAskedQ = [];
function pickFu(topic) {
  const pool = FOLLOWUPS[topic] || FOLLOWUPS.general;
  const unused = pool.filter(q => !globalAskedQ.includes(q));
  if (unused.length > 0) {
    const q = unused[Math.floor(Math.random() * unused.length)];
    globalAskedQ.push(q);
    if (globalAskedQ.length > 80) globalAskedQ = globalAskedQ.slice(-40); // keep last 40
    return q;
  }
  // Pool exhausted for this topic — try general or reset
  if (topic !== 'general') return pickFu('general');
  globalAskedQ = []; // full reset
  const q = pool[Math.floor(Math.random() * pool.length)];
  globalAskedQ.push(q);
  return q;
}

// --- Acknowledgments that reference user content ---
const ACKS = {
  positive: ["That sounds amazing! ","Oh wow, that's great! ","How cool! ","That's awesome! ","Nice one! ","I love that! "],
  neutral:  ["Oh I see! ","That's interesting! ","Mmm-hmm! ","Oh really? ","Got it! ","Oh nice! "],
  empathetic: ["Aww, I hear you. ","I understand. ","That's okay. ","Don't worry! ","I'm here for you. "],
};

// --- Unsafe content filter ---
const UNSAFE_V2 = ["kill","die","blood","weapon","gun","bomb","fight","hurt","hate","stupid","dumb","idiot","naked","sex","drugs","alcohol","smoke","violence","murder","steal"];
const REDIRECT_V2 = [
  {en:"Let's talk about something happy! What made you smile today? 🌈",zh:"咱们聊点开心的吧！今天有什么让你笑的事？"},
  {en:"Hmm, let's change the subject! What's something fun you did recently? 🎉",zh:"嗯，换个话题吧！最近有什么好玩的事？"},
  {en:"I'd rather talk about cool stuff! What's your favorite thing to do? 🐶",zh:"我更想聊酷酷的事！你最喜欢做什么？"},
];

// --- Context extraction ---
function extractCtx(text) {
  const low = text.toLowerCase();
  // Name
  let m = low.match(/(?:my name is|i'm|im|i am|call me)\s+([a-z]+)/i);
  if (m && !['a','the','so','very','really','not','here','there','fine','good','great','ok','okay','sure','happy','sad','tired','bored','hungry','back'].includes(m[1]))
    CTX.name = m[1][0].toUpperCase()+m[1].slice(1);
  // Mood
  const mp={happy:/\b(happy|glad|great|good|awesome|excited|wonderful)\b/i, sad:/\b(sad|unhappy|upset|cry|crying|lonely)\b/i, tired:/\b(tired|sleepy|exhausted)\b/i, bored:/\b(bored|boring)\b/i, angry:/\b(angry|mad|annoyed|frustrated)\b/i};
  for(const[k,p] of Object.entries(mp)) if(p.test(low)) CTX.mood=k;
  // Likes
  m = low.match(/(?:i like|i love|i enjoy|my favorite is)\s+(.{2,30}?)(?:\.|!|$|,| and | but )/i);
  if(m && CTX.likes.length<10) { const v=m[1].trim(); if(v&&!CTX.likes.includes(v)) CTX.likes.push(v); }
  // Age
  m = low.match(/i'?m\s+(\d{1,2})\s*(years?\s*old)?/i); if(m && +m[1]>3 && +m[1]<20) CTX.age=+m[1];
  // Grade
  m = low.match(/grade\s+(\d+)|(\d+)(?:th|st|nd|rd)\s*grade/i); if(m) CTX.grade=m[1]||m[2];
  // Topic tracking
  const topics={food:/\b(food|eat|cook|pizza|rice|noodle|chicken|fruit|cake|snack)\b/i,hobby:/\b(game|play|draw|sing|dance|read|movie|music|hobby)\b/i,school:/\b(school|class|homework|exam|teacher|math|english)\b/i,animal:/\b(animal|dog|cat|pet|bird|fish|rabbit)\b/i,sport:/\b(sport|football|basketball|swim|run|bike)\b/i,travel:/\b(travel|trip|visit|vacation|country|city|beach)\b/i};
  for(const[t,p] of Object.entries(topics)) if(p.test(low)&&!CTX.lastTopics.includes(t)){CTX.lastTopics.push(t);if(CTX.lastTopics.length>5)CTX.lastTopics.shift();}
  CTX.history.push(text); if(CTX.history.length>20) CTX.history.shift();
}

// --- Smart thread detection ---
function detectThreadSmart(text) {
  const low=text.toLowerCase(); let best=null,bestS=0;
  for(const[k,t] of Object.entries(THREADS)){
    let s=0; for(const kw of t.kw) if(low.includes(kw.toLowerCase()))s++;
    if(s>bestS){bestS=s;best=k;}
  }
  return bestS>0?best:null;
}

// --- Pick fallback (no recent repeats) ---
let fbUsed=[];
function pickFallback(){
  if(fbUsed.length>=SMART_FB.length) fbUsed=[];
  let i; do{i=Math.floor(Math.random()*SMART_FB.length);}while(fbUsed.includes(i));
  fbUsed.push(i); return SMART_FB[i];
}

// --- MAIN: generateResponse2 (upgraded v3 — games, QBANK, smarter) ---
function generateResponse2(userText) {
  const low = userText.toLowerCase().trim();
  CTX.turnCount++;
  extractCtx(userText);

  const R = (en,zh) => ({en,zh});
  const pick = a => a[Math.floor(Math.random()*a.length)];
  const nameTag = () => CTX.name ? `, ${CTX.name}` : '';

  // 0. GAME STATE — handle ongoing games first
  if (guessState) {
    const gr = handleGuess(userText);
    if (gr) return {response:gr, quickReplies:["Play again!","Let's chat instead","Tell me a riddle!"]};
  }

  // 0b. Riddle state — user trying to answer
  if (gameMode === 'riddle' && gameData) {
    const ans = gameData.a.toLowerCase().replace(/[^a-z ]/g,'');
    const guess = low.replace(/[^a-z ]/g,'');
    if (guess.includes(ans) || ans.includes(guess)) {
      gameMode = null; gameData = null;
      return {response:R(
        `YES! That's right! You're so clever${nameTag()}! 🎉 Want another riddle or something else?`,
        `对啦！你好聪明${nameTag()}！🎉 再来一个谜语还是聊别的？`
      ), quickReplies:["Another riddle!","Let's play a game!","Let's chat!"]};
    }
    // Hint request — give a small clue without revealing
    const hintPattern = /\b(hint|give me a hint|clue|more clues|need help)\b/i;
    if (hintPattern.test(low) || /提示|线索/.test(userText)) {
      // Give first letter or length as hint
      const firstLetter = gameData.a.charAt(0).toUpperCase();
      const wordLen = gameData.a.length;
      return {response:pick([
        R(`Here's a hint! 🤔 The answer starts with "${firstLetter}" and has ${wordLen} letters. Try again!`,
          `给你一个提示！🤔 答案以"${firstLetter}"开头，有${wordLen}个字母。再试试！`),
        R(`Hint time! 🤔 It starts with the letter "${firstLetter}". Can you think of what it is?`,
          `提示时间！🤔 它以字母"${firstLetter}"开头。能想到是什么吗？`),
      ]), quickReplies:["I think I know!","Tell me the answer!","Another hint please!"]};
    }
    // Detect give-up
    const giveUpPattern = /\b(i don't know|dont know|give up|i give up|tell me|no idea|what is it|what's the answer|reveal|pass|skip|too hard)\b/i;
    if (giveUpPattern.test(low) || /不知道|告诉我|答案|太难/.test(userText)) {
      const answer = gameData.a;
      gameMode = null; gameData = null;
      return {response:pick([
        R(`The answer is: "${answer}"! 🧩 Don't worry, riddles are tricky! Now you'll know it next time! Want another one?`,
          `答案是："${answer}"！🧩 别担心，谜语本来就难！下次你就知道了！再来一个？`),
        R(`It's "${answer}"! 🤔 Riddles make your brain stronger! That's a great new word to learn. Try another?`,
          `是"${answer}"！🤔 猜谜语能让大脑更强！这是个很好的新词汇。再试一个？`),
      ]), quickReplies:["Another riddle!","Let's play something else","Tell me a fun fact!"]};
    }
    // Wrong answer — reveal with encouragement
    gameMode = null;
    const answer = gameData.a;
    gameData = null;
    return {response:pick([
      R(`Not quite, but good try! The answer was: "${answer}"! 🧩 Now you know something new! Want to try another riddle?`,
        `不太对，但好尝试！答案是："${answer}"！🧩 又学到新东西了！再来一个谜语？`),
      R(`Close! The answer is "${answer}"! 😄 Every riddle you try makes your English better! Another one?`,
        `差一点！答案是"${answer}"！😄 每猜一个谜语英语就进步一点！再来？`),
    ]), quickReplies:["Another riddle!","Let's play something else","Tell me a fun fact!"]};
  }

  // 1. Safety
  for(const kw of UNSAFE_V2) if(low.includes(kw)){
    gameMode = null; guessState = null;
    return {response:pick(REDIRECT_V2), quickReplies:["Sure!","OK, new topic!"]};
  }

  // 2. Farewell
  if(/\b(bye|goodbye|see you|good night|goodnight|gotta go|gtg)\b/i.test(low)||/再见|拜拜|晚安/.test(userText)){
    gameMode = null; guessState = null;
    return {response:pick([
      R(`Bye bye${nameTag()}! You did amazing today! See you next time! 🐶💕`,`拜拜${nameTag()}！你今天超棒！下次见！`),
      R(`Good night! Sweet dreams! I'll be right here, dreaming of our chat! 🌙`,`晚安！好梦！我会在这里，梦到我们的聊天！`),
      R(`See you${nameTag()}! Don't forget — you're awesome at English! ⭐`,`再见${nameTag()}！别忘了——你英语超厉害！`),
      R(`Aww, leaving already? My tail will be wagging when you come back! 🐾`,`这就要走了？你回来的时候我尾巴还会摇的！`),
      R(`Bye${nameTag()}! Before you go — you know what? You're the best friend a puppy could have! 💛`,`拜拜${nameTag()}！走之前——你知道吗？你是小狗能拥有的最好的朋友！`),
    ]), quickReplies:[]};
  }

  // 3. Thank you
  if(/\b(thanks|thank you|thx|ty)\b/i.test(low)||/谢谢/.test(userText)){
    return {response:pick([
      R(`You're welcome${nameTag()}! That's what puppy friends are for! 🐶💛`,`不客气${nameTag()}！小狗朋友就是这样的嘛！`),
      R(`No problem at all! I love helping my favorite person! ⭐`,`完全没问题！我最喜欢帮我最爱的人了！`),
      R(`Anytime! Your smile is the best treat for me! 😊`,`随时！你的笑容是给我最好的零食！`),
    ]), quickReplies:["Let's keep chatting!","Play a game!","Tell me something fun!"]};
  }

  // 4. "I don't know" — acknowledge it's OK, offer different paths
  if(/\b(don't know|dont know|no idea|not sure|idk)\b/i.test(low)||/不知道|不懂/.test(userText)){
    const paths = [
      // Change topic approach
      () => {
        const qItem = pickQB('fun');
        return {response:pick([
          R(`That's totally fine${nameTag()}! Nobody knows everything, not even puppies! 😄 Let me ask you something different: ${qItem.q}`,
            `没关系${nameTag()}！谁也不是什么都知道，连小狗也不知道呢！😄 来个不一样的问题：${qItem.q}`),
          R(`No worries at all! Let's try a fun one instead — ${qItem.q}`,
            `完全没关系！来试试一个有趣的——${qItem.q}`),
        ]), quickReplies:["Hmm, let me think...","I know!","Tell me something else!"]};
      },
      // Encourage to try again approach
      () => {
        return {response:pick([
          R(`Hey, it's OK not to know! That's how we learn! 🐶 Want me to give you a hint, or try a different question?`,
            `嘿，不知道也没关系！这就是学习的方式！🐶 要我给你提示，还是换个问题？`),
          R(`That's a great answer too! "I don't know" is the first step to learning something new! ⭐ What would you like to learn about?`,
            `这也是个好回答！"不知道"是学习新东西的第一步！⭐ 你想学什么？`),
        ]), quickReplies:["Give me a hint!","Try a different question!","Let's play a game!"]};
      },
      // Easy redirect approach
      () => {
        return {response:pick([
          R(`Haha, me neither sometimes! 🐾 Let's talk about something fun — what did you eat for breakfast today?`,
            `哈哈，我有时候也不知道！🐾 聊点有趣的——你今天早餐吃了什么？`),
          R(`Puppies don't know everything either! 🐶 But we can figure things out together! What's your favorite thing to do on weekends?`,
            `小狗也不是什么都知道！🐶 但我们可以一起弄明白！你周末最喜欢做什么？`),
        ]), quickReplies:["I ate...","I like to...","Play a game!"]};
      },
    ];
    return paths[Math.floor(Math.random() * paths.length)]();
  }

  // 5. Sorry
  if(/\b(sorry|oops|my bad)\b/i.test(low)||/对不起|抱歉/.test(userText)){
    return {response:pick([
      R(`No need to say sorry${nameTag()}! You're doing great! 💪`,`不用道歉${nameTag()}！你做得很好！`),
      R(`Hey, puppies make mistakes too! No big deal! Let's keep going! 🐶`,`小狗也会犯错！完全没关系！继续！`),
    ]), quickReplies:["OK! Play a game?","What should we talk about?","Tell me something fun!"]};
  }

  // 6. Grammar check — now handled by evaluateEnglish() in send()
  // (Removed inline correction to avoid double-correction; grammar tips appear as gentle suggestions)

  // 7. GAME REQUESTS — detect when user wants to play
  if(/\b(play a game|let's play|game time|play something)\b/i.test(low)||/玩游戏/.test(userText)){
    const games = ['guess','wyr','riddle','fun','story'];
    const chosen = pick(games);
    if (chosen === 'guess') {
      gameMode = 'guess';
      const r = startGuessGame();
      return {response:r, quickReplies:["Is it a dog?","Is it a cat?","Hmm, I need more clues!"]};
    }
    if (chosen === 'wyr') {
      gameMode = 'wyr';
      const item = pickQB('wyr');
      return {response:R(
        `Would You Rather! 🤔 ${item.q}`,
        `你会选择哪个？🤔 ${item.q}`
      ), quickReplies:["The first one!","The second one!","Both!"]};
    }
    if (chosen === 'riddle') {
      gameMode = 'riddle';
      gameData = pickQB('riddle');
      return {response:R(
        `Riddle time! 🧩 ${gameData.q}`,
        `猜谜语！🧩 ${gameData.q}`
      ), quickReplies:["Hmm, I think I know!","Give me a hint!","I give up!"]};
    }
    if (chosen === 'story') {
      const item = pickQB('story');
      return {response:R(
        `Story time! 📖 ${item.q}`,
        `故事时间！📖 ${item.q}`
      ), quickReplies:["And then...","Suddenly...","But wait!"]};
    }
    const item = pickQB('fun');
    return {response:R(
      `Here's a fun one! 🎮 ${item.q}`,
      `来个有趣的！🎮 ${item.q}`
    ), quickReplies:["Let me think!","That's easy!","Wow, hard question!"]};
  }

  // 7b. Specific game requests
  if(/\b(riddle|guess|brain teaser)\b/i.test(low)){
    if(/\bguess\b/i.test(low)){
      gameMode = 'guess';
      const r = startGuessGame();
      return {response:r, quickReplies:["Is it a lion?","Is it a bear?","I need more clues!"]};
    }
    gameMode = 'riddle';
    gameData = pickQB('riddle');
    return {response:R(`Riddle time! 🧩 ${gameData.q}`,`猜谜语！🧩 ${gameData.q}`),
      quickReplies:["I think I know!","Give me a hint!","Tell me the answer!"]};
  }
  if(/\b(would you rather|wyr)\b/i.test(low)){
    const item = pickQB('wyr');
    gameMode = 'wyr';
    return {response:R(`Would You Rather! 🤔 ${item.q}`,`你会选择哪个？🤔 ${item.q}`),
      quickReplies:["The first one!","The second one!","Both!"]};
  }
  if(/\b(story|let's make a story|tell.*story)\b/i.test(low)){
    const item = pickQB('story');
    return {response:R(`Let's make a story! 📖 ${item.q}`,`来编故事！📖 ${item.q}`),
      quickReplies:["And then...","Suddenly...","But wait!"]};
  }
  if(/\b(fun fact|did you know|tell me something)\b/i.test(low)){
    const item = pickQB('fact');
    return {response:R(item.q, item.q), quickReplies:["Wow really?","Tell me another!","I have a fact too!"]};
  }
  if(/\b(challenge|word challenge|word game)\b/i.test(low)){
    const item = pickQB('word');
    return {response:R(item.q, item.q), quickReplies:["I did it!","That was hard!","Give me another one!"]};
  }

  // 7c. Handle Would You Rather answer
  if (gameMode === 'wyr') {
    gameMode = null;
    const choice = /\b(first|one|1|左边|第一个)\b/i.test(low) ? 'first'
      : /\b(second|two|2|right|右边|第二个)\b/i.test(low) ? 'second'
      : /\b(both|all|都)\b/i.test(low) ? 'both' : null;
    const reaction = choice ? pick(WYR_REACTIONS[choice]) : pick(WYR_REACTIONS.first);
    const nextItem = Math.random() > 0.5 ? pickQB('wyr') : null;
    const followUp = nextItem ? ` Want another one? Here: ${nextItem.q}` : ' What else should we talk about?';
    return {response:R(reaction + followUp, reaction),
      quickReplies: nextItem ? ["The first one!","The second one!"] : ["Play another game!","Tell me a riddle!","Let's chat!"]};
  }

  // 8. User asks Cody a question — use puppy personality + smart follow-up
  if(/\?$/.test(userText.trim()) || /\b(what|who|where|when|how|why|do you|are you|can you|is it|does)\b/i.test(low)) {
    for(const[kw,arr] of Object.entries(PUPPY_A)){
      if(low.includes(kw)){
        const a=pick(arr);
        const fuTopic=Object.keys(FOLLOWUPS).find(t=>low.includes(t))||'general';
        const fu=pickFu(fuTopic);
        return {response:R(a.en+' '+fu, a.zh), quickReplies:["That's cool!","Tell me more!","Play a game!"]};
      }

    if(/\bhow are you\b/i.test(low))
      return {response:pick([
        R(`I'm doing great${nameTag()}! I just had a yummy snack and now I'm chatting with my favorite person! What about you? 😊`,
          `我很好${nameTag()}！刚吃了零食，现在在和最喜欢的人聊天！你呢？`),
        R(`I'm super happy because you're here${nameTag()}! Every time we talk, my tail wags extra hard! 🐾 How are YOU feeling?`,
          `我超开心因为你来了${nameTag()}！每次聊天我尾巴都摇得特别厉害！你感觉怎么样？`),
      ]), quickReplies:["I'm good too!","I'm a bit tired","Tell me a joke!"]};
    if(/\bwhat.*doing\b/i.test(low))
      return {response:pick([
        R(`I was just wagging my tail waiting for you! Now I'm the happiest puppy! 🐾 What are YOU doing?`,
          `我刚才在摇尾巴等你来！现在我是最开心的小狗！你在做什么？`),
        R(`I was napping and dreaming about treats! Then you came and now I'm wide awake! 😄 What about you?`,
          `我刚才在做零食的美梦！然后你来了我就醒了！你呢？`),

    // Generic question — respond warmly and redirect

      R(`Hmm, that's a great question${nameTag()}! I'm just a little puppy, so I'm still learning! But tell me — what do YOU think? 🤔`,
        `嗯，好问题${nameTag()}！我还是只小狗，还在学习！但告诉我——你觉得呢？`),
      R(`Ooh, I'm not sure about that one! But I'm curious about YOU — ${pickFu('general')}`,
        `哦，这个我不太确定！但我对你很好奇——${pickFu('general')}`),
    ]), quickReplies:["I think...","Good question!","Let me think!"]};
  }

  // 9. Short response handling — encourage longer sentences
  const wc = low.split(/\s+/).filter(w=>w.length>0).length;
  if(wc<=3){
    if(/\b(yes|yeah|yep|sure|of course|yup|ya)\b/i.test(low)){
      // Use context to ask a relevant follow-up
      const topic = CTX.lastTopics.length > 0 ? CTX.lastTopics[CTX.lastTopics.length-1] : 'general';
      return {response:pick([
        R(`That's great${nameTag()}! Can you tell me more in a full sentence? Like "I think that..." or "Yes, because..." 🐶`,

        R(`Awesome! Now use a longer sentence to tell me why! Practice makes perfect! ⭐`,
          `好棒！用更长的句子告诉我为什么！练习使人完美！`),
        R(`Cool! Here's a challenge — can you say the same thing but with 5 or more words? 🌟`,
          `好酷！来个挑战——能用5个以上的词重新说一遍吗？`),
      ]), quickReplies:["Well, I think that...","Yes, because...","OK so basically..."]};
    }
    if(/\b(no|nope|nah|not really)\b/i.test(low)){
      const item = Math.random() > 0.5 ? pickQB('fun') : null;
      return {response:pick([
        R(`Oh, that's okay${nameTag()}! What WOULD you like to talk about? 🐾`,
          `没关系${nameTag()}！那你想聊什么？`),
        R(`No problem! ${item ? 'How about this: ' + item.q : 'What makes you happy? 😊'}`,
          `没事！${item ? '试试这个：' + item.q : '什么让你开心？😊'}`),
      ]), quickReplies:["I want to talk about...","Play a game!","Tell me a riddle!"]};
    }
    if(wc<=2){
      return {response:pick([
        R(`I want to hear more! Can you say that in a full sentence? You can do it! 💪`,
          `我想多听一点！能用完整的句子说吗？你可以的！`),
        R(`Ooh, tell me more! Try: "I think..." or "I like..." or "Because..." 📝`,
          `多说一点！试试："我觉得……"或"我喜欢……"或"因为……"`),
      ]), quickReplies:["OK let me try!","Well, I think that...","So basically..."]};
    }
  }

  // 10. Emotion / mood responses
  if(CTX.mood){
    const emoR={
      happy:[
        R(`Yay! I'm so happy you're happy${nameTag()}! Your happiness makes my tail go crazy! What's making you feel so good? 🐶💕`,
          `太好了！你开心我尾巴都摇疯了！什么事让你这么开心？`),
      ],
      sad:[
        R(`Aww${nameTag()}, I'm sorry you're feeling sad. I'm right here with you. Want to tell me what happened? Or we could play a game to cheer up! 💛`,
          `哦${nameTag()}，你难过我很心疼。我在这里陪你。想说说是怎么回事，还是玩个游戏开心一下？`),
      ],
      tired:[
        R(`Being tired means you worked hard! That's something to be proud of${nameTag()}! Want to just chat or play something easy? 💪`,
          `累了说明你很努力！值得骄傲${nameTag()}！想随便聊聊还是玩个轻松的游戏？`),
      ],
      bored:[
        R(`Bored? I have the perfect cure! Let's play a game! How about Guess the Animal, or Would You Rather? 🎮`,
          `无聊？我有完美的解决方案！来玩游戏吧！猜动物还是你会选择哪个？`),
      ],
      angry:[
        R(`It's okay to feel angry sometimes. Take a deep breath with me — woof! Want to talk about it or play a game to feel better? 🐶`,
          `有时候生气也没关系。跟我深呼吸——汪！想说说还是玩游戏好起来？`),
      ],
    };
    if(emoR[CTX.mood] && Math.random()>0.25){
      const r=pick(emoR[CTX.mood]);
      CTX.mood='';
      return {response:r, quickReplies:["Let me tell you...","Play a game!","I feel better now"]};
    }
  }

  // 11. Continue current thread — with smarter acknowledgment
  if(currentThread && threadStep<THREADS[currentThread].steps.length && threadCooldown>0){
    threadCooldown--;
    const step=THREADS[currentThread].steps[threadStep++];
    const words=userText.split(/\s+/).filter(w=>w.length>3);
    let ack;
    if(words.length>2){
      const uw=pick(words.slice(0,4));
      ack = pick([
        `Oh, ${uw}? That's interesting! `,
        `I love that you mentioned ${uw}! `,
        `${uw} — cool! `,
        `Wait, ${uw}? That's awesome! `,
      ]);
    } else {
      ack = pick(ACKS.positive);
    }
    return {response:R(ack+step.r.en, step.r.zh), quickReplies:step.q};
  }

  // 12. Detect new thread
  const detected = detectThreadSmart(userText);
  if(detected){
    currentThread=detected; threadStep=1; threadCooldown=THREADS[detected].steps.length;
    if(!CTX.lastTopics.includes(detected)){CTX.lastTopics.push(detected);if(CTX.lastTopics.length>5)CTX.lastTopics.shift();}
    const step=THREADS[detected].steps[0];
    let en=step.r.en, zh=step.r.zh;
    if(CTX.name && Math.random()>0.5){
      en=en.replace('!',`, ${CTX.name}!`).replace(/\?$/,`, ${CTX.name}?`);
    }
    return {response:R(en,zh), quickReplies:step.q};
  }

  // 13. Thread ended — transition with game or fresh topic
  if(currentThread && threadStep>=THREADS[currentThread].steps.length){
    currentThread=null; threadStep=0;
    // Mix it up: 50% new question, 30% game, 20% fun fact
    const roll = Math.random();
    if (roll < 0.3) {
      // Suggest a game
      const games = [
        R(`You're such a great chat buddy${nameTag()}! 🌟 Want to play a game? I know Guess the Animal, Would You Rather, and Riddles!`,
          `你真是个聊天小能手${nameTag()}！🌟 想玩游戏吗？我会猜动物、你会选择哪个、还有谜语！`),
        R(`I love talking with you! 😊 How about a game break? Say "play" to start!`,
          `我好喜欢和你聊天！😊 来个游戏休息？说"play"开始！`),
      ];
      return {response:pick(games), quickReplies:["Play a game!","Tell me a riddle!","Let's keep chatting!"]};
    }
    if (roll < 0.5) {
      const item = pickQB(pick(['fun','fact','wyr']));
      return {response:R(
        `You speak English so well${nameTag()}! ⭐ Here's something fun: ${item.q}`,
        `你英语说得真好${nameTag()}！⭐ 来个有趣的：${item.q}`
      ), quickReplies:["Let me think!","Wow!","Tell me more!"]};
    }
    const unused=Object.keys(FOLLOWUPS).filter(t=>!CTX.lastTopics.includes(t)&&t!=='general'&&t!=='game'&&t!=='story');
    const topic=unused.length>0?pick(unused):'general';
    const q=pickFu(topic);
    return {response:pick([
      R(`My puppy brain wants to know more about you! 🐶 ${q}`,`我的小狗脑子想了解更多！🐶 ${q}`),
      R(`Great chatting${nameTag()}! 😊 ${q}`,`聊得好开心${nameTag()}！😊 ${q}`),
      R(`You're so interesting${nameTag()}! ${q}`,`你好有趣${nameTag()}！${q}`),
    ]), quickReplies:["Sure!","Good question!","Hmm, let me think..."]};
  }

  // 14. SMART FALLBACK — use context, QBANK, and variety
  const fb = pickFallback();

  // Strategy: alternate between pure fallback, fallback+question, QBANK item, echo response
  const strategy = CTX.turnCount % 5;

  // Echo response — reflect user's words back naturally (every 5th turn)
  if (strategy === 4 && userText.split(/\s+/).length > 4) {
    const keyWords = userText.split(/\s+/).filter(w => w.length > 3 && !/^(that|this|with|have|from|they|them|what|when|where|which|about|would|could|should)$/i.test(w));
    if (keyWords.length > 0) {
      const kw = pick(keyWords.slice(0,3));
      const echoR = pick([
        R(`${fb.en} You mentioned "${kw}" — tell me more about that! 🤔`, `${fb.zh} 你提到了"${kw}"——多说说这个！`),
        R(`I'm really curious about what you said about "${kw}"${nameTag()}! Can you explain more? 🐶`, `我很好奇你说的"${kw}"${nameTag()}！能多解释一下吗？`),
      ]);
      return {response:echoR, quickReplies:["Well, so basically...","It's like this...","Let me explain!"]};
    }
  }

  // QBANK item (every 5th turn + 1)
  if (strategy === 1) {
    const types = ['fun','wyr','fact','deep','word'];
    const item = pickQB(pick(types));
    return {response:R(
      `${fb.en} Oh! ${item.q}`,
      `${fb.zh} 哦！${item.q}`
    ), quickReplies:["Hmm, let me think!","That's easy!","Good question!"]};
  }

  // Follow-up question (every 3rd turn)
  if(CTX.turnCount%3===0){
    const fuTopic=CTX.lastTopics.length>0?pick(CTX.lastTopics):'general';
    const fu=pickFu(fuTopic);
    return {response:R(fb.en+' '+fu, fb.zh), quickReplies:["Sure!","Good question!","Let me think..."]};
  }

  // Default — varied quick replies
  return {response:fb, quickReplies:pick([
    ["Tell me more!","That's cool!","Play a game!"],
    ["Oh interesting!","Keep going!","Tell me a riddle!"],
    ["Really? Wow!","What about you, Cody?","Tell me a fun fact!"],
    ["I see!","What else?","Would you rather...?"],
  ]) };
}

}

function setQuickReplies(items) {
  qrContainer.innerHTML = items.map((t,i) =>
    `<button class="quick-btn" data-i="${i}">${esc(t)}</button>`
  ).join('');
  qrContainer.querySelectorAll('.quick-btn').forEach((btn,i) => {
    btn.onclick = () => { qrContainer.innerHTML=''; send(items[i], true); };
  });
}

function highlight(text) {
  return text.split(/(\s+|[!?.,'"]+)/).map(w => {
    const clean = w.toLowerCase().replace(/[^a-z\s]/g,'').trim();
    if (DICT[clean]) return `<span class="word-hint" onclick="showWord('${clean}')">${w}</span>`;
    return w;
  }).join('');
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ============================================================
//  TTS UNLOCK — browsers require user interaction before audio plays
// ============================================================
let ttsUnlocked = false;
function unlockTTS() {
  if (ttsUnlocked || !('speechSynthesis' in window)) return;
  ttsUnlocked = true;
  // Play a silent utterance to unlock the audio context
  const silent = new SpeechSynthesisUtterance(' ');
  silent.volume = 0.01;
  silent.rate = 2;
  if (preferredVoice) silent.voice = preferredVoice;
  speechSynthesis.speak(silent);
}
// Attach unlock to all user interaction events
['click','touchstart','keydown','touchend'].forEach(evt => {
  document.addEventListener(evt, unlockTTS, {once: false, passive: true});
});

// Score user's English and generate encouraging feedback
function evaluateEnglish(userText) {
  if (!userText || userText.trim().length < 2) return null;
  const low = userText.toLowerCase();
  const wordCount = userText.split(/\s+/).filter(w => w.length > 0).length;

  // Skip very short responses (yes/no/ok) — not enough to evaluate
  if (wordCount <= 2 && /^\s*(yes|no|ok|okay|yeah|nope|sure|hi|hello|bye|thanks|cool|nice|wow|hm+|uh+h+|oh)\s*$/i.test(userText))
    return null;

  // Check grammar rules
  const errors = [];
  for (const rule of GRAMMAR_RULES) {
    if (rule.p.test(low)) {
      errors.push(rule);
    }
  }

  // If errors found, return a gentle correction
  if (errors.length > 0) {
    const err = errors[0]; // Just show the first error to avoid overwhelming
    const corrected = userText.replace(err.p, err.fix);
    // Vary the feedback style
    const templates = [
      {en:`💡 **Grammar tip**: Try saying "${corrected}"! ${err.en}. You're doing great!`,
       zh:`💡 **语法小提示**：试试说 "${corrected}"！${err.tip}。你已经很棒了！`},
      {en:`💡 Quick fix: "${corrected}" — ${err.en}. Keep practicing!`,
       zh:`💡 小修正："${corrected}" —— ${err.tip}。继续加油！`},
      {en:`💡 Hey, small tip! Instead of that, try: "${corrected}" — ${err.en}. Your English is getting better!`,
       zh:`💡 小提示！可以这样说："${corrected}" —— ${err.tip}。你的英语越来越好了！`},
    ];
    const t = templates[Math.floor(Math.random() * templates.length)];
    return {type: 'correction', ...t};
  }

  // No errors — praise based on sentence length/complexity
  if (wordCount >= 8) {
    const praises = [
      {en:"⭐ Great sentence! Your English is really impressive!", zh:"⭐ 好句子！你的英语真的很棒！"},
      {en:"⭐ Wow, that was a wonderful sentence! Very natural!", zh:"⭐ 哇，这句话太棒了！非常自然！"},
      {en:"⭐ Excellent English! You speak like a native! Keep it up!", zh:"⭐ 英语太棒了！说得像母语者一样！继续保持！"},
      {en:"⭐ Perfect grammar! You're really good at English!", zh:"⭐ 语法完美！你英语真的很厉害！"},
    ];
    const p = praises[Math.floor(Math.random() * praises.length)];
    return {type: 'praise', ...p};
  }
  if (wordCount >= 5) {
    // Occasionally praise medium-length correct sentences
    if (Math.random() > 0.6) {
      const praises = [
        {en:"⭐ Nice sentence! That's correct English!", zh:"⭐ 好句子！这是正确的英语！"},
        {en:"⭐ Good job! Your grammar is correct!", zh:"⭐ 做得好！你的语法是正确的！"},
      ];
      const p = praises[Math.floor(Math.random() * praises.length)];
      return {type: 'praise', ...p};
    }
  }
  return null; // No feedback needed
}

// ============================================================
//  SEND MESSAGE
// ============================================================
function send(text, isQuickReply) {
  if (!text.trim()) return;
  addUserMsg(text);
  qrContainer.innerHTML = '';

  const result = generateResponse2(text);

  // Grammar evaluation — only for user's own words (not quick reply buttons), skip during games
  const inGame = guessState || gameMode;
  const grammarTip = (isQuickReply || inGame) ? null : evaluateEnglish(text);

  setTimeout(() => {
    // Main response
    addAiMsg(result.response.en, result.response.zh);

    // Grammar tip as a separate small message (after main response, with delay)
    if (grammarTip && grammarTip.en) {
      setTimeout(() => {
        addGrammarTip(grammarTip);
      }, 1200);
    }

    if (result.quickReplies && result.quickReplies.length) {
      setTimeout(() => setQuickReplies(result.quickReplies), 900);
    }
  }, 200);
}

// Add a grammar tip message (smaller, styled differently)
function addGrammarTip(tip) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.style.animation = 'msgIn .4s cubic-bezier(.34,1.56,.64,1)';
  row.innerHTML = `<div class="msg-avatar">${codySVG()}</div>
    <div class="msg-bubble" style="background:linear-gradient(135deg,#FFF8E1,#FFF3CD);border-left:3px solid #FFB300;font-size:13.5px;padding:10px 14px;">
      <div class="en" style="font-size:14px;font-weight:500;">${tip.en.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</div>
      ${tip.zh ? `<div class="zh" style="margin-top:3px;">${tip.zh.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</div>` : ''}
    </div>`;
  chatArea.appendChild(row);
  scrollBottom();
  // Speak the English grammar tip
  speak(tip.en.replace(/\*\*/g,'').replace(/💡|⭐/g,''));
}

function handleSend() {
  const t = textInput.value.trim();
  if (!t) return;
  send(t);
  textInput.value = '';
}

// ============================================================
//  TTS — optimized for loud, natural boy voice (anti-robotic)
// ============================================================
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
let voicesReady = false;

function initVoices() {
  if (!('speechSynthesis' in window)) return;
  const pick = () => {
    const voices = speechSynthesis.getVoices();
    if (voices.length === 0) return;
    voicesReady = true;
    // Priority: Windows "Microsoft Guy", iOS "Aaron", then any young male
    if (isIOS) {
      preferredVoice =
        voices.find(v => /en[-_]US/i.test(v.lang) && /evan|nicky|junior/i.test(v.name)) ||
        voices.find(v => /en/i.test(v.lang) && /evan|nicky|junior/i.test(v.name)) ||
        voices.find(v => /en[-_]US/i.test(v.lang) && /aaron/i.test(v.name)) ||
        voices.find(v => /en/i.test(v.lang) && /aaron/i.test(v.name)) ||
        voices.find(v => /en[-_]US/i.test(v.lang) && /boy|young|child|kid/i.test(v.name)) ||
        voices.find(v => /en[-_]US/i.test(v.lang) && !/fred|reed|organ|sandy|shelley|ralph|albert|don|arthur|bruce/i.test(v.name)) ||
        voices.find(v => /en/i.test(v.lang) && !/fred|reed|organ|sandy|shelley|ralph|albert|don|arthur|bruce/i.test(v.name)) ||
        voices.find(v => v.lang.startsWith('en'));
    } else {
      preferredVoice =
        voices.find(v => /en[-_]US/i.test(v.lang) && /guy/i.test(v.name)) ||
        voices.find(v => /en/i.test(v.lang) && /guy/i.test(v.name)) ||
        voices.find(v => /en[-_]US/i.test(v.lang) && /aaron|nicky|junior|evan/i.test(v.name)) ||
        voices.find(v => /en/i.test(v.lang) && /aaron|nicky|junior|evan/i.test(v.name)) ||
        voices.find(v => /en[-_]US/i.test(v.lang) && /boy|young|child|kid/i.test(v.name)) ||
        voices.find(v => /en[-_]US/i.test(v.lang) && /david|mark|charlie/i.test(v.name)) ||
        voices.find(v => /en[-_]US/i.test(v.lang) && !/zira|susan|linda|jennifer|michelle|samantha|karen|don|fred|reed|organ|sandy|shelley|ralph|albert|arthur|bruce|george|paul|daniel|james/i.test(v.name)) ||
        voices.find(v => /en/i.test(v.lang) && !/zira|susan|linda|jennifer|michelle|samantha|karen|don|fred|reed|organ|sandy|shelley|ralph|albert|arthur|bruce|george|paul|daniel|james/i.test(v.name)) ||
        voices.find(v => v.lang.startsWith('en'));
    }
  };
  pick();
  speechSynthesis.onvoiceschanged = pick;
  let retries = 0;
  const retryInterval = setInterval(() => {
    if (voicesReady || retries > 10) { clearInterval(retryInterval); return; }
    pick(); retries++;
  }, 300);
}
initVoices();

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  let clean = text
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,'')
    .replace(/[⭐🌟💪💕🌈🌙🎉🤔😊🐶🦴🍦☀️⏰👫🐾🎨🎬🎵📚📖🏫🏟️🎁🏆🌍✈️🎥📝🧳]/g,'')
    .replace(/"/g,'').trim();
  // Split into natural sentence chunks for more human-like delivery
  const chunks = clean.match(/[^!?\.]+[!?\.]+|[^!?\.]+$/g) || [clean];
  chunks.forEach((chunk, i) => {
    chunk = chunk.trim();
    if (!chunk) return;
    const u = new SpeechSynthesisUtterance(chunk);
    u.lang = 'en-US';
    // Young boy voice: higher pitch + faster rate = energetic kid
    // iOS pitch 1.55 (avoid 2.0 which distorts); Desktop 1.7
    const basePitch = isIOS ? 1.55 : 1.7;
    const baseRate  = isIOS ? 1.06 : 1.02;
    // Small random variation per sentence (±0.06) for natural feel
    u.pitch = Math.max(0.5, Math.min(2, basePitch + (Math.random() - 0.5) * 0.12));
    u.rate  = Math.max(0.5, Math.min(2, baseRate  + (Math.random() - 0.5) * 0.08));
    u.volume = 1;
    if (preferredVoice) u.voice = preferredVoice;
    // Slight pause between sentences via boundary event
    if (i > 0) u.pitch = Math.max(0.5, u.pitch - 0.02); // tiny drop = natural
    speechSynthesis.speak(u);
  });
}

function speakWord(w) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w);
  u.lang = 'en-US';
  u.rate = isIOS ? 1.0 : 0.95;
  u.pitch = isIOS ? 1.55 : 1.7;
  u.volume = 1;
  if (preferredVoice) u.voice = preferredVoice;
  speechSynthesis.speak(u);
}

// ============================================================
//  ASR — SPEECH RECOGNITION
// ============================================================
function initASR() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('micBtn');
  if (!SR) {
    micBtn.onclick = () => toast('浏览器不支持语音，请打字输入 😊');
    return;
  }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;

  micBtn.onclick = () => {
    if (isRecording) { recognition.stop(); return; }
    try { recognition.start(); } catch(e) {}
  };

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
    textInput.placeholder = 'Listening... 🎧';
    toast('Speak English! 开始说！🎤');
  };

  recognition.onresult = (e) => {
    let f='', t='';
    for (let i=e.resultIndex; i<e.results.length; i++)
      e.results[i].isFinal ? f+=e.results[i][0].transcript : t+=e.results[i][0].transcript;
    textInput.value = f || t;
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    textInput.placeholder = 'Type or tap 🎤 to speak...';
    const v = textInput.value.trim();
    if (v) { send(v); textInput.value=''; }
  };

  recognition.onerror = (e) => {
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    textInput.placeholder = 'Type or tap 🎤 to speak...';
    if (e.error==='no-speech') toast('没听到声音，再试一次？🎤');
    else if (e.error==='not-allowed') toast('请允许麦克风权限 🎤');
    else toast('识别出错了，试试打字吧 😊');
  };
}
initASR();

}

// ============================================================
//  INPUT HANDLERS
// ============================================================
document.getElementById('sendBtn').onclick = handleSend;
textInput.addEventListener('keydown', e => {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); handleSend(); }
});

// iOS Safari requires speechSynthesis to be activated by user gesture
// Warm up on first tap anywhere
(function iosSpeechWarmup() {
  if (!('speechSynthesis' in window)) return;
  const warmup = () => {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    speechSynthesis.speak(u);
    document.removeEventListener('touchstart', warmup);
    document.removeEventListener('click', warmup);
  };
  document.addEventListener('touchstart', warmup, { once: true });
  document.addEventListener('click', warmup, { once: true });
})();

// ============================================================
//  VOICE PICKER — let user choose the best voice on their device
// ============================================================
let savedVoiceName = '';
try { savedVoiceName = localStorage.getItem('cody_voice') || ''; } catch(e){}

function openVoicePicker() {
  const voices = speechSynthesis.getVoices().filter(v => /en/i.test(v.lang));
  const list = document.getElementById('voiceList');
  list.innerHTML = '';
  voices.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'voice-item' + (preferredVoice === v ? ' active' : '');
    item.innerHTML = `<span class="vi-play">▶</span><span class="vi-name">${esc(v.name)}</span><span class="vi-lang">${v.lang}</span>`;
    item.onclick = () => {
      // Preview this voice
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance('Hi! I am Cody! I am a little puppy!');
      u.lang = 'en-US';
      u.voice = v;
      u.pitch = isIOS ? 1.55 : 1.7;
      u.rate = isIOS ? 1.06 : 1.02;
      speechSynthesis.speak(u);
      // Select it
      preferredVoice = v;
      try { localStorage.setItem('cody_voice', v.name); } catch(e){}
      // Update active state
      list.querySelectorAll('.voice-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      toast('已选择: ' + v.name);
    };
    list.appendChild(item);
  });
  document.getElementById('voicePanel').classList.add('show');
  document.getElementById('voiceBackdrop').classList.add('show');
}
function closeVoicePicker() {
  document.getElementById('voicePanel').classList.remove('show');
  document.getElementById('voiceBackdrop').classList.remove('show');
  speechSynthesis.cancel();
}
document.getElementById('voiceBtn').onclick = openVoicePicker;

// Restore saved voice on load
if (savedVoiceName && 'speechSynthesis' in window) {
  const restoreVoice = () => {
    const voices = speechSynthesis.getVoices();
    const saved = voices.find(v => v.name === savedVoiceName);
    if (saved) preferredVoice = saved;
  };
  restoreVoice();
  speechSynthesis.addEventListener('voiceschanged', restoreVoice);
}
